# Axor Lab edge — the only server Cloudflare talks to.
#   * TLS terminated here with a Cloudflare Origin Certificate (Full-strict).
#   * the SPA is static; /api, /e, /jobs-api are reverse-proxied to lab-server.
#   * the real client IP is restored from Cloudflare so logs/limits are honest.
# Lock the origin to Cloudflare at the firewall too (see deploy/README.md) so the
# box is unreachable except through Cloudflare.

# Restore the visitor IP from Cloudflare's CF-Connecting-IP (refresh the ranges
# from https://www.cloudflare.com/ips/ periodically).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# 80 → 443. Cloudflare (Full-strict) still reaches the origin over TLS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;  # Cloudflare routes the domain; the origin accepts any host

    # Cloudflare Origin Certificate (generate in the Cloudflare dashboard →
    # SSL/TLS → Origin Server), mounted read-only by docker-compose.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;  # bundles are bounded (matches the server cap)

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # publications / catalog / incidents / audit / compliance / license API
    location /api/ { proxy_pass http://lab-server:8000; }
    # publication + evidence + incident HTML pages
    location /e/  { proxy_pass http://lab-server:8000; }

    # runtime-jobs API — strip the /jobs-api prefix, keep SSE unbuffered
    location /jobs-api/ {
        proxy_pass http://lab-server:8010/;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Host $host;
    }

    # the SPA — everything else falls back to index.html (hash router)
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
