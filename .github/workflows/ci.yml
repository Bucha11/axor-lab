name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contract schemas (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Validate slice examples against schemas
        working-directory: contracts
        run: |
          python validate.py
          python validate_slice.py

  acceptance:
    name: Acceptance suite (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      # report every Python leg independently — a flake on one version must not
      # cancel the other and mask its real result (review r14: CI is authoritative)
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run acceptance tests (stdlib only, no dependencies)
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke-check the shipped example resolves
        run: python -m lab_runner validate examples/banking-exfil-01.axl

  lint:
    name: Lint (ruff — correctness rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ruff (pyflakes + bugbear; no style noise)
        run: |
          pip install ruff
          ruff check lab_contracts lab_runner lab_analysis lab_adapters lab_server \
            lab_agent lab_entitlement lab_endpoint lab_sandbox lab_games

  determinism:
    name: Replay determinism matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Replay must be bit-identical (pinned kernel, cross-OS)
        run: python -m unittest tests.test_acceptance_05_replay_exact -v

  schema-compat:
    name: Schema-compatibility gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: A schema change that breaks the slice examples or AgentDojo import fails CI
        run: |
          cd contracts && python validate_slice.py && cd ..
          python -m unittest tests.test_agentdojo_adapter tests.test_packaging -v

  real-kernel:
    name: Real axor-core kernel integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the real kernel and run the integration tests
        # a job named "real-kernel integration" must not be green without
        # running: no `|| echo` swallowing a failed install, and an explicit
        # import assertion so the integration tests cannot silently skip
        # (review r6/r18). If axor-core is not installable here, this job fails
        # loudly — configure the install source rather than skip past it. EVERY
        # suite carrying @skipUnless(axor_available()) real-kernel tests runs
        # here — not just test_real_kernel — so a real-kernel regression on the
        # endpoint or replay surfaces cannot hide behind a stdlib-job skip.
        run: |
          pip install "axor-core>=0.9"
          python -c "import axor_core; print('axor-core', axor_core.__version__)"
          python -c "from lab_runner import axor_available; assert axor_available(), 'axor-core must import so the real-kernel tests RUN, not skip'"
          python -m unittest -v \
            tests.test_real_kernel \
            tests.test_endpoint_kernel_identity \
            tests.test_replay_capability

  crypto:
    name: Signing tests actually run (PyNaCl installed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyNaCl so the Ed25519 bundle + license signing tests do NOT skip
        # the stdlib CI job runs everything but skips the crypto paths; this job
        # exists so those paths are exercised in CI, not silently skipped. EVERY
        # suite carrying @skipUnless(_HAS_NACL) signature tests runs here — the
        # portable receipt, server acceptance, reproduction-package and
        # verification-outcome proofs, not just the two original suites (r18).
        run: |
          pip install "pynacl>=1.5"
          python -c "import importlib.util as u; assert u.find_spec('nacl'), 'PyNaCl must be present so the crypto tests RUN, not skip'"
          python -m unittest -v \
            tests.test_hardening \
            tests.test_entitlement \
            tests.test_package_verification \
            tests.test_portable_receipt \
            tests.test_server_acceptance \
            tests.test_verification_outcome

  packaging:
    name: Wheel installs and runs outside the checkout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build + install the wheel into a clean venv, run outside the source tree
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          # run from / with no AXOR_LAB_CONTRACTS and no contracts/ nearby:
          # the schemas must load from package data
          cd / && /tmp/venv/bin/python -c "
          from lab_contracts import load_schemas, validate_artifact
          s = load_schemas(); assert set(s) >= {'trace','bundle','scenario'}, s
          print('schemas loaded from package data:', len(s))
          "
          cd / && /tmp/venv/bin/axor-lab --help >/dev/null && echo 'axor-lab console script works'
